apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesqueeze-server
  namespace: kubesqueeze-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesqueeze-collector
  namespace: kubesqueeze-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesqueeze-executor
  namespace: kubesqueeze-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesqueeze-collector
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods", "events", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesqueeze-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesqueeze-collector
subjects:
  - kind: ServiceAccount
    name: kubesqueeze-collector
    namespace: kubesqueeze-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesqueeze-executor
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesqueeze-executor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesqueeze-executor
subjects:
  - kind: ServiceAccount
    name: kubesqueeze-executor
    namespace: kubesqueeze-system
