apiVersion: v1
kind: Secret
metadata:
  name: postgres
  namespace: kubesqueeze-system
type: Opaque
stringData:
  POSTGRES_USER: kubesqueeze
  POSTGRES_PASSWORD: kubesqueeze
  POSTGRES_DB: kubesqueeze
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kubesqueeze-system
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: kubesqueeze-system
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17.5-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: postgres
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kubesqueeze"]
            initialDelaySeconds: 3
            periodSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
