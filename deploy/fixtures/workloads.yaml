            - {name: WORKLOAD_NAME, value: sales-demo}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: bursty}
            - {name: BASE_CPU_CORES, value: "0.08"}
            - {name: PEAK_CPU_CORES, value: "0.45"}
          ports: [{containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
            requests: {cpu: 400m, memory: 128Mi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: production
  labels: {app: payments-api, environment: production, criticality: tier-0}
spec:
  replicas: 5
  selector: {matchLabels: {app: payments-api}}
  template:
    metadata:
      labels: {app: payments-api, criticality: tier-0}
      annotations: {prometheus.io/scrape: "true"}
    spec:
      priorityClassName: production-critical
      containers:
        - name: workload
          image: kubesqueeze:dev
          imagePullPolicy: Never
          args: ["workload"]
          env:
            - {name: WORKLOAD_NAME, value: payments-api}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: production}
            - {name: BASE_CPU_CORES, value: "1.3"}
            - {name: PEAK_CPU_CORES, value: "2.8"}
          ports: [{containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
            requests: {cpu: "1", memory: 512Mi}
            limits: {cpu: "2", memory: 1Gi}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payments-api
  namespace: production
spec:
  minAvailable: 4
  selector: {matchLabels: {app: payments-api}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: production
  labels: {app: orders-api, environment: production, criticality: tier-1}
spec:
  replicas: 4
  selector: {matchLabels: {app: orders-api}}
  template:
    metadata:
      labels: {app: orders-api}
      annotations: {prometheus.io/scrape: "true"}
    spec:
      containers:
        - name: workload
          image: kubesqueeze:dev
          imagePullPolicy: Never
          args: ["workload"]
          env:
            - {name: WORKLOAD_NAME, value: orders-api}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: production}
            - {name: BASE_CPU_CORES, value: "0.9"}
            - {name: PEAK_CPU_CORES, value: "2.1"}
          ports: [{containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
