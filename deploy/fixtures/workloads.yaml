---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orders-api
  namespace: production
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: orders-api}
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 70}
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: production-critical
value: 100000
globalDefault: false
description: Production workloads that KubeSqueeze must never modify.
---
apiVersion: v1
kind: Service
metadata:
  name: redis-simulation
  namespace: development
spec:
  clusterIP: None
  selector: {app: redis-simulation}
  ports: [{port: 8081, targetPort: 8081}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-simulation
  namespace: development
  labels: {app: redis-simulation, environment: development, data-classification: synthetic}
spec:
  serviceName: redis-simulation
  replicas: 3
  selector: {matchLabels: {app: redis-simulation}}
  template:
    metadata:
      labels: {app: redis-simulation}
      annotations: {prometheus.io/scrape: "true"}
    spec:
      containers:
        - name: workload
          image: kubesqueeze:dev
          imagePullPolicy: Never
          args: ["workload"]
          env:
            - {name: WORKLOAD_NAME, value: redis-simulation}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: steady}
            - {name: BASE_CPU_CORES, value: "0.15"}
            - {name: PEAK_CPU_CORES, value: "0.35"}
          ports: [{containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
            requests: {cpu: 300m, memory: 256Mi}
          volumeMounts: [{name: data, mountPath: /data}]
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-simulation
  namespace: development
spec:
  maxUnavailable: 1
  selector: {matchLabels: {app: redis-simulation}}
