apiVersion: v1
kind: Namespace
metadata:
  name: development
  labels:
    environment: development
    owner: platform-engineering
---
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: production
    protected: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: preview-pr-1842
  labels:
    environment: preview
    preview-age: 9d
    pull-request: "1842"
---
apiVersion: v1
kind: Namespace
metadata:
  name: preview-pr-1901
  labels:
    environment: preview
    preview-age: 2d
    pull-request: "1901"
---
apiVersion: v1
kind: Namespace
metadata:
  name: customer-demos
  labels:
    environment: development
    customer-facing: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-feature-flags
  namespace: development
data:
  new-checkout: "true"
  synthetic-load-profile: office-hours
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-preview
  namespace: preview-pr-1842
  labels:
    app: catalog-preview
    environment: preview
    preview.kubesqueeze.io/owner: pr-1842
spec:
  replicas: 3
  selector:
    matchLabels:
      app: catalog-preview
  template:
    metadata:
      labels:
        app: catalog-preview
      annotations:
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: workload
          image: kubesqueeze:dev
          imagePullPolicy: Never
          args: ["workload"]
          env:
            - {name: WORKLOAD_NAME, value: catalog-preview}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: abandoned}
            - {name: BASE_CPU_CORES, value: "0.008"}
            - {name: PEAK_CPU_CORES, value: "0.02"}
          ports: [{name: http, containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
            requests: {cpu: 500m, memory: 128Mi}
            limits: {cpu: "1", memory: 256Mi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-preview
  namespace: preview-pr-1901
  labels: {app: search-preview, environment: preview}
spec:
  replicas: 2
  selector: {matchLabels: {app: search-preview}}
  template:
    metadata:
      labels: {app: search-preview}
      annotations: {prometheus.io/scrape: "true"}
    spec:
      containers:
        - name: workload
          image: kubesqueeze:dev
          imagePullPolicy: Never
          args: ["workload"]
          env:
            - {name: WORKLOAD_NAME, value: search-preview}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: bursty}
            - {name: BASE_CPU_CORES, value: "0.03"}
            - {name: PEAK_CPU_CORES, value: "0.18"}
          ports: [{containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
            requests: {cpu: 300m, memory: 96Mi}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: search-preview
  namespace: preview-pr-1901
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: search-preview}
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 65}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: development
  labels: {app: checkout-api, environment: development, team: checkout}
spec:
  replicas: 5
  strategy: {type: RollingUpdate, rollingUpdate: {maxUnavailable: 1, maxSurge: 1}}
  selector: {matchLabels: {app: checkout-api}}
  template:
    metadata:
      labels: {app: checkout-api, tier: api}
      annotations: {prometheus.io/scrape: "true"}
    spec:
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: {matchLabels: {app: checkout-api}}
      containers:
        - name: workload
          image: kubesqueeze:dev
          imagePullPolicy: Never
          args: ["workload"]
          env:
            - {name: WORKLOAD_NAME, value: checkout-api}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: office-hours}
            - {name: BASE_CPU_CORES, value: "0.18"}
            - {name: PEAK_CPU_CORES, value: "0.62"}
          ports: [{containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
            requests: {cpu: 500m, memory: 192Mi}
            limits: {cpu: "1", memory: 384Mi}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-api
  namespace: development
  labels: {app: recommendation-api, environment: development, team: discovery}
spec:
  replicas: 4
  selector: {matchLabels: {app: recommendation-api}}
  template:
    metadata:
      labels: {app: recommendation-api, tier: api}
      annotations: {prometheus.io/scrape: "true"}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector: {matchLabels: {app: recommendation-api}}
      containers:
        - name: workload
          image: kubesqueeze:dev
          imagePullPolicy: Never
          args: ["workload"]
          env:
            - {name: WORKLOAD_NAME, value: recommendation-api}
            - name: WORKLOAD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
            - {name: UTILIZATION_PATTERN, value: steady}
            - {name: BASE_CPU_CORES, value: "0.22"}
            - {name: PEAK_CPU_CORES, value: "0.48"}
          ports: [{containerPort: 8081}]
          readinessProbe: {httpGet: {path: /healthz, port: 8081}, initialDelaySeconds: 1, periodSeconds: 3}
          resources:
            requests: {cpu: 400m, memory: 256Mi}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: recommendation-api
  namespace: development
spec:
  minAvailable: 3
  selector: {matchLabels: {app: recommendation-api}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollback-demo
  namespace: development
  labels: {app: rollback-demo, environment: development, team: reliability}
  annotations:
