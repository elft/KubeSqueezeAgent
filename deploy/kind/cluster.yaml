kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
  - role: worker
    labels:
      demo.kubesqueeze.io/pool: general
      topology.kubernetes.io/zone: demo-a
  - role: worker
    labels:
      demo.kubesqueeze.io/pool: general
      topology.kubernetes.io/zone: demo-b
  - role: worker
    labels:
      demo.kubesqueeze.io/pool: previews
      topology.kubernetes.io/zone: demo-c
